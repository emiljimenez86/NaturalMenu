<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Menu — Categoría</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-categoria">
  <header class="main-header main-header--small">
    <div class="logo-container">
      <h1 class="logo">
        <a href="index.html" class="logo-frame">
          <img src="image/logo/LogoNaturalGastroBar.png" alt="Natural GastroBar" class="logo-img">
        </a>
      </h1>
    </div>
    <a href="index.html" class="back-link">← Menú</a>
  </header>

  <main class="category-page-main" id="category-content">
    <p class="loading-msg">Cargando...</p>
  </main>

  <section class="contact-section contact-section--compact">
    <h3 class="contact-title">Dirección</h3>
    <a href="https://maps.app.goo.gl/ojxhmL6VPi9TVXUM7" target="_blank" rel="noopener noreferrer" class="contact-link contact-address" aria-label="Ver ubicación en Google Maps">
      <span class="contact-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 4.28 3.4 8.31 5.44 10.37a1.99 1.99 0 0 0 2.82 0C15.6 17.31 19 13.28 19 9c0-3.87-3.13-7-7-7z" />
          <circle cx="12" cy="9" r="2.7" />
        </svg>
      </span>
      <span class="contact-address-text">
        Dirección: Carrera 20 la troncal frente al Cc Olímpica. Caucasia - Antioquia
      </span>
    </a>
    <h3 class="contact-title">Contáctanos</h3>
    <div class="contact-links">
    
      <a href="https://www.instagram.com/natural_caucasia/" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="Instagram">
        <span class="contact-icon"><img src="image/Redes/instagram.png" alt="Instagram"></span>
      </a>
      <a href="https://wa.me/573136904027" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="WhatsApp">
        <span class="contact-icon"><img src="image/Redes/whatsaap.png" alt="WhatsApp"></span>
      </a>
      <span class="contact-link contact-link--disabled" aria-label="Facebook (próximamente)">
        <span class="contact-icon">
          <img src="image/Redes/facebook.png" alt="Facebook (sin enlace por ahora)">
        </span>
    </div>
  </section>

  <footer class="main-footer">
    <p>© 2026 Natural GastroBar. Todos los derechos reservados.</p>
    <p>
      Emil Jiménez Ortiz - Desarrollador Web
      <a href="https://wa.me/573192364724" target="_blank" rel="noopener noreferrer" class="footer-whatsapp" aria-label="Contactar por WhatsApp">
        <img src="image/Redes/whatsaap.png" alt="WhatsApp">
      </a>
    </p>
  </footer>

  <script src="menu-data.js"></script>
  <script src="menu.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var cat = params.get('cat') || '';
      var container = document.getElementById('category-content');
      if (typeof MENU_DATA !== 'undefined' && MENU_DATA[cat]) {
        var data = MENU_DATA[cat];
        var html = '<h2 class="category-page-title">' + escapeHtml(data.title) + '</h2>';

        // En jugos mostramos primero la tarjeta de precios (antes de la lista)
        if (cat === 'jugos') {
          html += ''
            + '<section class="jugos-pricing-card">'
            +   '<h3 class="jugos-pricing-title">Precios jugos naturales</h3>'
            +   '<div class="jugos-pricing-options">'
            +     '<div class="jugos-price-pill">'
            +       '<span class="jugos-price-label">En agua</span>'
            +       '<span class="jugos-price-value">$12.000</span>'
            +     '</div>'
            +     '<div class="jugos-price-pill jugos-price-pill--milk">'
            +       '<span class="jugos-price-label">En leche</span>'
            +       '<span class="jugos-price-value">$15.000</span>'
            +     '</div>'
            +   '</div>'
            +   '<p class="jugos-pricing-note">Elige tu sabor favorito y dinos si lo quieres en agua o en leche.</p>'
            + '</section>';
        }

        html += '<ul class="plate-list">';
        data.items.forEach(function(item) {
          html += '<li class="plate">';

          if (item.image) {
            html += '<div class="plate-media"><img src="' + escapeHtml(item.image) + '" alt="' + escapeHtml(item.name) + '"></div>';
          }

          html += '<div class="plate-header">';
          html += '<span class="plate-name">' + escapeHtml(item.name) + '</span>';
          html += '<span class="plate-price">' + escapeHtml(item.price) + '</span>';
          html += '</div>';

          if (item.desc) {
            html += '<span class="plate-desc">' + escapeHtml(item.desc) + '</span>';
          }

          // En la categoría de jugos no mostramos botón de "Agregar a domicilio"
          if (cat !== 'jugos') {
            html += '<button type="button" class="plate-add" data-name="' +
              escapeHtml(item.name) + '" data-price="' + escapeHtml(item.price) + '" aria-label="Agregar a domicilio">' +
              '<span class="plate-add-icon" aria-hidden="true">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                  '<path d="M5 18h2l1-3h5l2 3h3" />' +
                  '<circle cx="7" cy="18" r="2" />' +
                  '<circle cx="17" cy="18" r="2" />' +
                  '<path d="M5 18l1-5h4l2-4h4" />' +
                '</svg>' +
              '</span>' +
              '<span class="plate-add-label">Agregar a domicilio</span>' +
            '</button>';
          }

          html += '</li>';
        });
        html += '</ul>';

        if (data.extra) {
          html += '<p class="category-extra">' + escapeHtml(data.extra) + '</p>';
        }
        container.innerHTML = html;
        document.title = 'Natural Menu — ' + data.title;

        inicializarPedidoSimple();
      } else {
        container.innerHTML = '<p class="loading-msg">Categoría no encontrada. <a href="index.html">Volver al menú</a></p>';
      }
      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function inicializarPedidoSimple() {
        var numeroWhatsapp = '573136904027';
        var botones = document.querySelectorAll('.plate-add');
        if (!botones.length) return;

        botones.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var nombre = btn.getAttribute('data-name') || '';
            var precio = btn.getAttribute('data-price') || '';

            var lineas = [
              'Hola, quiero hacer un pedido en Natural GastroBar:',
              '',
              nombre + ' - ' + precio,
              '',
              'Nombre:',
              'Observaciones:'
            ];

            var mensaje = lineas.join('\n');
            var url = 'https://wa.me/' + numeroWhatsapp + '?text=' + encodeURIComponent(mensaje);
            window.open(url, '_blank');
          });
        });
      }
    })();
  </script>
</body>
</html>
